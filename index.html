<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>学术论文写作指挥中心 — Academic Writing Command Center</title>
<style>
:root {
  --bg: #f8f9fb;
  --surface: #ffffff;
  --surface2: #f1f3f6;
  --border: #e2e5ea;
  --text: #1a1d23;
  --text2: #5f6570;
  --text3: #9499a3;
  --primary: #2563eb;
  --primary-light: #eff4ff;
  --primary-dark: #1d4ed8;
  --accent: #059669;
  --accent-light: #ecfdf5;
  --warn: #d97706;
  --warn-light: #fffbeb;
  --danger: #dc2626;
  --danger-light: #fef2f2;
  --purple: #7c3aed;
  --purple-light: #f5f3ff;
  --radius: 8px;
  --radius-lg: 12px;
  --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,.08);
  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  --mono: "SF Mono", "Fira Code", "Consolas", monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--bg); color: var(--text); line-height: 1.6; height: 100vh; overflow: hidden; }
#app { display: flex; height: 100vh; }

/* ── Sidebar ── */
#sidebar {
  width: 260px; min-width: 260px; background: var(--surface);
  border-right: 1px solid var(--border); display: flex; flex-direction: column;
  overflow-y: auto;
}
.sidebar-header { padding: 20px 20px 12px; border-bottom: 1px solid var(--border); }
.sidebar-header h1 { font-size: 16px; font-weight: 700; color: var(--primary); }
.sidebar-header .sub { font-size: 11px; color: var(--text3); margin-top: 2px; }
.stage-list { padding: 8px 12px; flex: 1; overflow-y: auto; }
.stage-item {
  display: flex; align-items: center; gap: 10px; padding: 10px 12px;
  border-radius: var(--radius); cursor: pointer; transition: all .15s;
  font-size: 13px; color: var(--text2); margin-bottom: 2px; border: 1px solid transparent;
}
.stage-item:hover { background: var(--surface2); color: var(--text); }
.stage-item.active { background: var(--primary-light); color: var(--primary); border-color: #d0d9f0; font-weight: 600; }
.stage-num {
  width: 26px; height: 26px; border-radius: 50%; background: var(--surface2);
  display: flex; align-items: center; justify-content: center; font-size: 11px;
  font-weight: 700; flex-shrink: 0;
}
.stage-item.active .stage-num { background: var(--primary); color: #fff; }
.stage-done .stage-num { background: var(--accent); color: #fff; }
.stage-tag { font-size: 10px; padding: 2px 6px; border-radius: 10px; margin-left: auto; flex-shrink: 0; }
.stage-tag.gate { background: var(--danger-light); color: var(--danger); }
.stage-tag.check { background: var(--warn-light); color: var(--warn); }
.sidebar-footer { padding: 12px 20px; border-top: 1px solid var(--border); font-size: 11px; color: var(--text3); }

/* ── Main ── */
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
#topbar {
  padding: 14px 24px; background: var(--surface); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 16px;
}
#topbar h2 { font-size: 18px; font-weight: 700; flex: 1; }
#topbar .badge { font-size: 11px; padding: 4px 10px; border-radius: 12px; font-weight: 600; }
.badge-stage { background: var(--primary-light); color: var(--primary); }
.badge-mode { background: var(--purple-light); color: var(--purple); cursor: pointer; }

#content-area { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 20px; }

/* ── Cards ── */
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 20px; box-shadow: var(--shadow);
}
.card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
.card-header h3 { font-size: 15px; font-weight: 700; }
.card-header .icon { font-size: 20px; }
.card-desc { font-size: 13px; color: var(--text2); margin-bottom: 12px; }

/* ── Prompt Builder ── */
.prompt-builder { display: flex; flex-direction: column; gap: 12px; }
.prompt-row { display: flex; gap: 12px; }
.prompt-field { flex: 1; display: flex; flex-direction: column; gap: 4px; }
.prompt-field label { font-size: 12px; font-weight: 600; color: var(--text2); }
.prompt-field input, .prompt-field textarea, .prompt-field select {
  padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius);
  font-size: 13px; font-family: var(--font); resize: vertical;
}
.prompt-field textarea { min-height: 60px; }
.prompt-field input:focus, .prompt-field textarea:focus, .prompt-field select:focus {
  outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,.1);
}
.btn {
  padding: 10px 20px; border: none; border-radius: var(--radius); font-size: 13px;
  font-weight: 600; cursor: pointer; transition: all .15s; display: inline-flex; align-items: center; gap: 6px;
}
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-dark); }
.btn-secondary { background: var(--surface2); color: var(--text); }
.btn-secondary:hover { background: var(--border); }
.btn-accent { background: var(--accent); color: #fff; }
.btn-warn { background: var(--warn); color: #fff; }
.btn-sm { padding: 6px 12px; font-size: 11px; }
.btn-group { display: flex; gap: 8px; flex-wrap: wrap; }

/* ── Result Box ── */
.result-box {
  background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 16px; font-size: 13px; max-height: 300px; overflow-y: auto;
  white-space: pre-wrap; font-family: var(--font); line-height: 1.7;
}
.result-box.empty { color: var(--text3); text-align: center; padding: 40px; }
.copy-btn { float: right; font-size: 11px; cursor: pointer; color: var(--primary); background: none; border: none; }

/* ── Tool Grid ── */
.tool-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
.tool-card {
  background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 14px; transition: all .15s; cursor: pointer;
}
.tool-card:hover { border-color: var(--primary); box-shadow: var(--shadow-md); }
.tool-card h4 { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
.tool-card .url { font-size: 11px; color: var(--primary); }
.tool-card p { font-size: 12px; color: var(--text2); margin-top: 4px; }

/* ── Quality Gates ── */
.gate-list { display: flex; flex-direction: column; gap: 8px; }
.gate-item {
  display: flex; align-items: center; gap: 10px; padding: 10px 14px;
  border-radius: var(--radius); background: var(--surface2); font-size: 13px;
}
.gate-item.warn { background: var(--warn-light); border: 1px solid #fcd34d; }
.gate-item.danger { background: var(--danger-light); border: 1px solid #fecaca; }
.gate-item.pass { background: var(--accent-light); border: 1px solid #a7f3d0; }
.gate-icon { font-size: 16px; flex-shrink: 0; }

/* ── Role Panel ── */
.role-tabs { display: flex; gap: 4px; background: var(--surface2); padding: 4px; border-radius: var(--radius); }
.role-tab {
  flex: 1; text-align: center; padding: 8px 12px; border-radius: 6px; cursor: pointer;
  font-size: 12px; font-weight: 600; transition: all .15s; border: none; background: transparent;
}
.role-tab.active { background: var(--surface); box-shadow: var(--shadow); }

/* ── Checklist ── */
.checklist { display: flex; flex-direction: column; gap: 6px; }
.checklist-item { display: flex; align-items: center; gap: 10px; font-size: 13px; padding: 6px 0; }
.checklist-item input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--accent); cursor: pointer; }

/* ── Progress Bar ── */
.progress-bar {
  height: 4px; background: var(--surface2); border-radius: 2px; margin-top: 8px; overflow: hidden;
}
.progress-fill { height: 100%; background: var(--primary); border-radius: 2px; transition: width .3s; }

/* ── Tabs ── */
.tab-bar { display: flex; gap: 0; border-bottom: 2px solid var(--border); margin-bottom: 16px; }
.tab-btn {
  padding: 8px 16px; border: none; background: none; cursor: pointer;
  font-size: 13px; color: var(--text2); font-weight: 500; transition: all .15s;
  border-bottom: 2px solid transparent; margin-bottom: -2px;
}
.tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 700; }

/* ── Toast ── */
.toast {
  position: fixed; bottom: 24px; right: 24px; padding: 12px 20px;
  border-radius: var(--radius); font-size: 13px; font-weight: 600; z-index: 1000;
  animation: slideUp .3s ease; background: var(--text); color: #fff;
}
@keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* ── Check Center Sidebar Entry ── */
.check-center-entry {
  display: flex; align-items: center; gap: 10px; padding: 10px 12px;
  border-top: 1px solid var(--border); margin-top: 8px;
  border-radius: var(--radius); cursor: pointer; transition: all .15s;
  font-size: 13px; font-weight: 600; color: var(--text2);
}
.check-center-entry:hover { background: #ffe4e6; }
.check-center-entry.active { background: #ffe4e6; color: #e11d48; font-weight: 700; }
.check-center-dot {
  width: 28px; height: 28px; border-radius: 50%; background: #ffe4e6;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; flex-shrink: 0;
}
.check-center-entry.active .check-center-dot { background: #e11d48; color: #fff; }

/* ── Check Center Main Panel ── */
.check-center { display: flex; flex-direction: column; gap: 16px; height: 100%; overflow-y: auto; }
.cc-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.cc-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 16px;
}
.cc-card.full { grid-column: 1 / -1; }
.cc-card-header { font-size: 14px; font-weight: 700; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
.cc-card-header .icon { font-size: 18px; }
.cc-textarea {
  width: 100%; height: 220px; border: 1px solid var(--border); border-radius: var(--radius);
  padding: 12px; font-family: var(--font); font-size: 13px; line-height: 1.8;
  resize: vertical; background: var(--surface2);
}
.cc-textarea:focus { outline: none; border-color: #e11d48; background: #fff; }
.cc-stats {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
}
.cc-stat {
  text-align: center; padding: 12px 8px; background: var(--surface2);
  border-radius: var(--radius);
}
.cc-stat .num { font-size: 22px; font-weight: 700; color: #e11d48; }
.cc-stat .lbl { font-size: 11px; color: var(--text3); margin-top: 2px; }
.cc-result {
  max-height: 300px; overflow-y: auto; font-size: 13px; line-height: 1.8;
  border: 1px solid var(--border); border-radius: var(--radius); padding: 12px;
  background: #fff;
}
.cc-result mark {
  background: #fecaca; padding: 1px 3px; border-radius: 2px; color: #991b1b;
}
.cc-tool-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
.cc-tool-item {
  display: flex; align-items: center; gap: 8px; padding: 10px 12px;
  background: var(--surface2); border-radius: var(--radius); cursor: pointer;
  transition: all .15s; font-size: 13px; font-weight: 500;
}
.cc-tool-item:hover { background: #ffe4e6; }
.cc-tool-item .t-name { flex: 1; }
.cc-tool-item .t-url { font-size: 11px; color: var(--text3); }
.cc-tip-grid { display: grid; gap: 8px; }
.cc-tip {
  padding: 10px 12px; border-left: 3px solid #e11d48;
  background: #fff1f2; border-radius: 0 var(--radius) var(--radius) 0;
  font-size: 12px; line-height: 1.6;
}
.cc-tip .t { font-weight: 700; color: #be123c; }
.cc-toolbar { display: flex; gap: 8px; }
.cc-btn {
  padding: 8px 16px; border: none; border-radius: var(--radius); cursor: pointer;
  font-size: 13px; font-weight: 600; transition: all .15s;
}
.cc-btn-primary { background: #e11d48; color: #fff; }
.cc-btn-primary:hover { background: #be123c; }
.cc-btn-secondary { background: var(--surface2); color: var(--text); }
.cc-btn-secondary:hover { background: var(--border); }
@media (max-width: 900px) {
  .cc-row { grid-template-columns: 1fr; }
  .cc-stats { grid-template-columns: repeat(2, 1fr); }
  .cc-tool-grid { grid-template-columns: 1fr; }
}

/* ── LaTeX Tools Sidebar Entry ── */
.latex-tools-entry {
  display: flex; align-items: center; gap: 10px; padding: 10px 12px;
  border-top: 1px solid var(--border);
  border-radius: var(--radius); cursor: pointer; transition: all .15s;
  font-size: 13px; font-weight: 600; color: var(--text2);
}
.latex-tools-entry:hover { background: #ecfeff; }
.latex-tools-entry.active { background: #ecfeff; color: #0891b2; font-weight: 700; }
.latex-tools-dot {
  width: 28px; height: 28px; border-radius: 50%; background: #ecfeff;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; flex-shrink: 0;
}
.latex-tools-entry.active .latex-tools-dot { background: #0891b2; color: #fff; }

/* ── LaTeX Tools Main Panel ── */
.lt-panel { display: flex; flex-direction: column; gap: 16px; height: 100%; overflow-y: auto; }
.lt-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.lt-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 16px;
}
.lt-card.full { grid-column: 1 / -1; }
.lt-card-header { font-size: 14px; font-weight: 700; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
.lt-card-header .icon { font-size: 18px; }
.lt-card-desc { font-size: 12px; color: var(--text2); margin-bottom: 10px; line-height: 1.6; }
.lt-input-row { display: flex; gap: 12px; margin-bottom: 12px; align-items: flex-end; flex-wrap: wrap; }
.lt-field { display: flex; flex-direction: column; gap: 4px; }
.lt-field label { font-size: 12px; font-weight: 600; color: var(--text2); }
.lt-field input {
  padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius);
  font-size: 13px; font-family: var(--font); width: 280px;
}
.lt-field input:focus { outline: none; border-color: #0891b2; box-shadow: 0 0 0 3px rgba(8,145,178,.1); }
.lt-cmd-box {
  background: #1e1e2e; color: #cdd6f4; padding: 10px 14px; border-radius: var(--radius);
  font-family: var(--mono); font-size: 12px; display: flex; align-items: center; gap: 8px;
  overflow-x: auto; white-space: nowrap; margin-top: 8px;
}
.lt-cmd-box .cmd-text { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; }
.lt-btn {
  padding: 8px 16px; border: none; border-radius: var(--radius); cursor: pointer;
  font-size: 13px; font-weight: 600; transition: all .15s; white-space: nowrap;
}
.lt-btn-primary { background: #0891b2; color: #fff; }
.lt-btn-primary:hover { background: #0e7490; }
.lt-btn-secondary { background: var(--surface2); color: var(--text); }
.lt-btn-secondary:hover { background: var(--border); }
.lt-btn-copy { background: #ecfeff; color: #0891b2; border: 1px solid #a5f3fc; padding: 6px 12px; font-size: 11px; }
.lt-btn-copy:hover { background: #cffafe; }
.lt-skill-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
.lt-skill-card {
  background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-lg);
  padding: 14px; transition: all .15s;
}
.lt-skill-card:hover { border-color: #0891b2; box-shadow: var(--shadow-md); }
.lt-skill-card h4 { font-size: 14px; font-weight: 700; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
.lt-skill-card p { font-size: 12px; color: var(--text2); margin-bottom: 8px; line-height: 1.5; }
.lt-skill-card .lt-badge { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 600; margin-bottom: 6px; }
.lt-badge.compile { background: #dcfce7; color: #15803d; }
.lt-badge.structure { background: #fef9c3; color: #a16207; }
.lt-badge.citation { background: #ede9fe; color: #6d28d9; }
.lt-badge.figure { background: #fce7f3; color: #be185d; }
.lt-checklist { display: flex; flex-direction: column; gap: 5px; margin-top: 8px; font-size: 11px; color: var(--text2); }
.lt-checklist-item { display: flex; align-items: center; gap: 6px; cursor: pointer; }
.lt-checklist-item.done { color: var(--accent); }
.lt-checklist-item.pending { color: var(--text3); }
.lt-workflow { display: flex; align-items: center; gap: 8px; padding: 16px; flex-wrap: wrap; justify-content: center; }
.lt-wf-step {
  padding: 10px 16px; background: var(--surface2); border: 2px solid var(--border);
  border-radius: var(--radius-lg); text-align: center; font-size: 12px; font-weight: 600;
  min-width: 110px; transition: all .15s;
}
.lt-wf-step:hover { border-color: #0891b2; background: #ecfeff; }
.lt-wf-arrow { font-size: 18px; color: var(--text3); }
.lt-ref-grid { display: grid; gap: 8px; }
.lt-ref-item {
  padding: 10px 12px; border-left: 3px solid #0891b2;
  background: #ecfeff; border-radius: 0 var(--radius) var(--radius) 0;
  font-size: 12px; line-height: 1.6;
}
.lt-ref-item .t { font-weight: 700; color: #0e7490; }
.lt-field-hint { font-size: 10px; color: var(--text3); margin-top: 2px; }
@media (max-width: 900px) {
  .lt-row { grid-template-columns: 1fr; }
  .lt-skill-grid { grid-template-columns: 1fr; }
  .lt-field input { width: 100%; }
  .lt-input-row { flex-direction: column; }
}

/* ── Analysis Center (Amber Theme #d97706) ── */
.analysis-entry {
  display: flex; align-items: center; gap: 10px; padding: 10px 12px;
  border-top: 1px solid var(--border);
  border-radius: var(--radius); cursor: pointer; transition: all .15s;
  font-size: 13px; font-weight: 600; color: var(--text2);
}
.analysis-entry:hover { background: #fffbeb; }
.analysis-entry.active { background: #fffbeb; color: #d97706; font-weight: 700; }
.analysis-dot {
  width: 28px; height: 28px; border-radius: 50%; background: #fef3c7;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; flex-shrink: 0;
}
.analysis-entry.active .analysis-dot { background: #d97706; color: #fff; }

.an-panel { display: flex; flex-direction: column; gap: 16px; height: 100%; overflow-y: auto; }
.an-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.an-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 16px;
}
.an-card.full { grid-column: 1 / -1; }
.an-card-header { font-size: 14px; font-weight: 700; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
.an-card-header .icon { font-size: 18px; }
.an-card-desc { font-size: 12px; color: var(--text2); margin-bottom: 10px; line-height: 1.6; }

.an-upload { border: 2px dashed var(--border); border-radius: var(--radius-lg); padding: 20px; text-align: center; cursor: pointer; transition: all .15s; }
.an-upload:hover { border-color: #d97706; background: #fffbeb; }
.an-upload input { display: none; }
.an-textarea {
  width: 100%; min-height: 200px; padding: 12px; border: 1px solid var(--border);
  border-radius: var(--radius); font-family: var(--font); font-size: 13px; line-height: 1.8;
  resize: vertical; background: var(--surface);
}
.an-textarea:focus { outline: none; border-color: #d97706; box-shadow: 0 0 0 3px rgba(217,119,6,.1); }

.an-score-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 12px; }
.an-score-card { text-align: center; padding: 10px 6px; background: var(--surface2); border-radius: var(--radius); }
.an-score-card .an-score-num { font-size: 24px; font-weight: 800; color: #d97706; }
.an-score-card .an-score-total { font-size: 36px; font-weight: 900; }
.an-score-card .an-score-label { font-size: 10px; color: var(--text2); margin-top: 2px; }
.an-score-bar-wrap { height: 6px; background: var(--border); border-radius: 3px; margin-top: 6px; overflow: hidden; }
.an-score-bar-fill { height: 100%; border-radius: 3px; transition: width .3s; }
.an-score-bar-fill.hi { background: #059669; }
.an-score-bar-fill.md { background: #d97706; }
.an-score-bar-fill.lo { background: #dc2626; }

.an-issue-list { display: flex; flex-direction: column; gap: 6px; max-height: 400px; overflow-y: auto; }
.an-issue {
  padding: 10px 12px; border-radius: var(--radius); font-size: 12px;
  border-left: 4px solid transparent; display: flex; align-items: flex-start; gap: 10px;
  transition: all .15s; cursor: default;
}
.an-issue.severe { background: #fef2f2; border-left-color: #dc2626; }
.an-issue.warn { background: #fffbeb; border-left-color: #d97706; }
.an-issue.info { background: #f0f9ff; border-left-color: #0891b2; }
.an-issue.pass { background: #f0fdf4; border-left-color: #059669; opacity: .7; }
.an-issue .an-issue-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
.an-issue .an-issue-body { flex: 1; min-width: 0; }
.an-issue .an-issue-title { font-weight: 700; margin-bottom: 2px; }
.an-issue .an-issue-detail { color: var(--text2); font-size: 11px; line-height: 1.5; }

      starts.forEach(s => { freq[s] = (freq[s] || 0) + 1; });
      const top = Object.entries(freq).sort((a,b) => b[1]-a[1]).slice(0, 3);
      return `最常见的3种句首：${top.map(([s,c]) => `"${s}"(${c}次)`).join('、')}，占 ${Math.round(top.reduce((a,[,c]) => a+c,0)/sentences.length*100)}%。建议变换句型。`;
    }
  }
];

function renderSidebar() {
  const list = document.getElementById('stageList');
  list.innerHTML = stages.map((s, i) => `

  updateProgress();
}

function updateProgress() {
  const pct = Math.round((completedStages.size / stages.length) * 100);
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';
}

function selectStage(idx) {

  document.getElementById('stageBadge').textContent = `阶段 ${idx+1}/${stages.length}`;
  document.getElementById('checkCenterEntry').classList.remove('active');
  document.getElementById('latexToolsEntry').classList.remove('active');
  document.getElementById('analysisEntry').classList.remove('active');

function buildBRTR() {
  const bg = document.getElementById('brtrBg')?.value || '';
  const role = document.getElementById('brtrRole')?.value || '';
  const task = document.getElementById('brtrTask')?.value || '';
  const req = document.getElementById('brtrReq')?.value || '';

  // Save to localStorage
  localStorage.setItem('brtr_' + currentStage, JSON.stringify({ bg, role, task, req }));

  const prompt = `Background: ${bg}

Role: 你是${role}，在相关领域有丰富经验。

Task: ${task}

Request: ${req}

请开始执行。`;

  const resultBox = document.getElementById('promptResult');
  if (resultBox) {
    resultBox.className = 'result-box';
    resultBox.textContent = prompt;
  }
  const copyBtn = document.getElementById('copyBtn');
  if (copyBtn) copyBtn.style.display = 'inline-flex';
}

function useTemplate() {
  const templates = promptTemplates[currentStage] || [];
  if (templates.length === 0) return;
  // Pick the first template
  loadTemplate(0);
}

function loadTemplate(idx) {
  const templates = promptTemplates[currentStage] || [];
  if (idx >= templates.length) return;
  const t = templates[idx];
  const resultBox = document.getElementById('promptResult');
  if (resultBox) {
    resultBox.className = 'result-box';
    resultBox.textContent = t.template;
  }
  const copyBtn = document.getElementById('copyBtn');
  if (copyBtn) copyBtn.style.display = 'inline-flex';
}

function copyPrompt() {
  const resultBox = document.getElementById('promptResult');
  if (!resultBox || resultBox.classList.contains('empty')) return;
  navigator.clipboard.writeText(resultBox.textContent).then(() => {
    showToast('✅ 提示词已复制到剪贴板');
  });
}

function saveStageContent() {
  const editor = document.getElementById('stageEditor');
  if (!editor) return;
  stageContent['stage_' + currentStage] = editor.value;
  localStorage.setItem('awc_stageContent', JSON.stringify(stageContent));
  showToast('💾 内容已暂存');
}

function toggleCheck(stageIdx, key, checked) {
  const saved = JSON.parse(localStorage.getItem('checks_' + stageIdx) || '{}');
  saved[key] = checked;
  localStorage.setItem('checks_' + stageIdx, JSON.stringify(saved));
}

function markStageDone() {
  if (completedStages.has(currentStage)) {
    completedStages.delete(currentStage);
  } else {
    completedStages.add(currentStage);
  }
  localStorage.setItem('awc_completed', JSON.stringify([...completedStages]));
  renderSidebar();
  renderContent();
  if (completedStages.has(currentStage)) {
    showToast('✅ 阶段已完成！继续加油！');
  }
}

function setMode(mode) {
  currentMode = mode;
  const labels = { author: '👤 作者模式', reviewer: '🔍 审稿人模式', devil: '😈 魔鬼代言人模式' };
  document.getElementById('modeBadge').textContent = labels[mode];

  // Update role tabs if visible
  document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'));
  const tabs = document.querySelectorAll('.role-tab');
  const idx = { author: 0, reviewer: 1, devil: 2 }[mode];
  if (tabs[idx]) tabs[idx].classList.add('active');

  localStorage.setItem('awc_mode', mode);
}

function cycleMode() {
  const modes = ['author', 'reviewer', 'devil'];
  const idx = modes.indexOf(currentMode);
  setMode(modes[(idx + 1) % 3]);
}

function runRoleReview() {
  const input = document.getElementById('roleInput')?.value || '';
  if (!input.trim()) { showToast('请先粘贴待审阅文本'); return; }

  const resultBox = document.getElementById('roleResult');
  if (!resultBox) return;

  const modePrompts = {
    author: '作为作者，请优化以下段落的表达，使其更学术化、更流畅，同时保持个人风格：',
    reviewer: '作为期刊审稿人，请对以下段落进行严格的专业审阅。指出：(1)逻辑问题 (2)方法不足 (3)表述模糊处 (4)改进建议。评分1-10：',
    devil: '作为魔鬼代言人，请找出以下段落的所有潜在缺陷、逻辑漏洞和未经验证的假设。每个问题评分1-5严重程度，只有≥4的必须修改：'
  };

  const prompt = modePrompts[currentMode] + '\n\n' + input;
  resultBox.className = 'result-box';
  resultBox.textContent = '【提示词已生成，请复制到 Claude/ChatGPT 等 AI 工具中执行】\n\n' + prompt;
}

function runDevilAdvocate() {
  const input = document.getElementById('roleInput')?.value || '';
  if (!input.trim()) { showToast('请先粘贴待审阅文本'); return; }

  const resultBox = document.getElementById('roleResult');
  if (!resultBox) return;

  const prompt = `你是"魔鬼代言人"审稿者。你的任务是找到以下学术写作文本中的所有潜在问题。

规则：
1. 对每个问题给出 1-5 严重程度评分
2. 只有 ≥4 分的问题才是必须修改的
3. 不要为了"好合作"而轻易让步
4. 攻击强度保持在合理学术讨论范围内

请逐项审查以下文本，找出：逻辑漏洞、未经验证的假设、过度推论、方法论缺陷、数据解读问题。

---
${input}`;

  resultBox.className = 'result-box';
  resultBox.textContent = '【魔鬼代言人挑战提示词】\n\n' + prompt;

  // Also update the mode
  setMode('devil');
}

function showToast(msg) {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = msg;
  container.appendChild(toast);
  setTimeout(() => { toast.remove(); }, 2000);
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function saveLatexProjectPath() {

}

function updateLatexCommands() {
  const projectPath = document.getElementById('ltProjectPath')?.value || '';
  const mainTex = document.getElementById('ltMainTex')?.value || 'main.tex';

  if (!projectPath) return;

  const allCmdBoxes = document.querySelectorAll('.lt-cmd-box .cmd-text');
  allCmdBoxes.forEach(el => {
    const original = el.getAttribute('data-original') || el.textContent;
    if (!el.getAttribute('data-original')) el.setAttribute('data-original', original);
    const updated = original
      .replace(/__PROJECT__/g, projectPath)
      .replace(/__MAIN__/g, mainTex);
    el.textContent = updated;
  });

  const remoteEl = document.querySelector('#quickrun-remote-cmd');
  if (remoteEl) {
    const origRemote = remoteEl.getAttribute('data-original') || remoteEl.textContent;
    if (!remoteEl.getAttribute('data-original')) remoteEl.setAttribute('data-original', origRemote);
    remoteEl.textContent = origRemote
      .replace(/__PROJECT__/g, projectPath)
      .replace(/__MAIN__/g, mainTex);
  }
}

function copyLatexCmd(cmdBoxId) {
  const box = document.getElementById(cmdBoxId);
  if (!box) return;
  const textEl = box.querySelector('.cmd-text');
  if (!textEl) return;
  const text = textEl.textContent.trim();
  navigator.clipboard.writeText(text).then(() => {
    showToast('✅ 命令已复制到剪贴板');
  });
}

function copyLatexCmdVariant(variantId) {
  const el = document.getElementById(variantId + '-cmd');

  });
}

function toggleLatexCheck(skillId, idx) {
  const key = `lt_check_${skillId}_${idx}`;
  const current = localStorage.getItem(key);
  const newState = current === 'done' ? '' : 'done';
  localStorage.setItem(key, newState);

  const el = document.getElementById(`lt-check-${skillId}-${idx}`);
  if (!el) return;
  if (newState === 'done') {
    el.className = 'lt-checklist-item done';
    el.querySelector('span').textContent = '✅';
  } else {
    el.className = 'lt-checklist-item pending';
    el.querySelector('span').textContent = '⬜';
  }
}

function restoreLatexChecks() {
  latexSkills.forEach(skill => {
    skill.checkItems.forEach((_, i) => {
      const key = `lt_check_${skill.id}_${i}`;
      const state = localStorage.getItem(key);

        const el = document.getElementById(`lt-check-${skill.id}-${i}`);

          el.className = 'lt-checklist-item done';
          const span = el.querySelector('span');
          if (span) span.textContent = '✅';

    });
  });
}

// ── Analysis State ──

let lastResults = null; // { issues, scores, fixedText }

function saveAnalysisText() {
  const editor = document.getElementById('anEditor');
  if (editor) localStorage.setItem('awc_analysisText', editor.value);
}

function handleAnalysisFileUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  if (file.name.endsWith('.txt')) {
    reader.onload = function(ev) {
      const editor = document.getElementById('anEditor');
      if (editor) { editor.value = ev.target.result; saveAnalysisText(); }
      showToast('已加载: ' + file.name + ' (' + ev.target.result.length + ' 字符)');
    };
    reader.readAsText(file, 'UTF-8');
  } else if (file.name.endsWith('.docx')) {
    reader.onload = async function(ev) {
      try {
        const text = await parseDocx(ev.target.result);
        const editor = document.getElementById('anEditor');
        if (editor) { editor.value = text; saveAnalysisText(); }
        showToast('已解析: ' + file.name + ' (' + text.length + ' 字符)');
      } catch (err) {
        showToast('解析失败: ' + (err.message || '无效的 .docx 文件'));
      }
    };
    reader.readAsArrayBuffer(file);
  } else {
    showToast('仅支持 .txt 和 .docx 格式');
  }
  e.target.value = '';
}

// ── Analysis Engine ──

function runAnalysis() {
  const editor = document.getElementById('anEditor');
  const text = (editor ? editor.value : '').trim();
  if (!text) { showToast('请先粘贴论文文本'); return; }

  let totalChars = text.length;
  let cnChars = (text.match(/[一-鿿]/g) || []).length;

  // Run all 18 rules
  const issues = [];
  for (const rule of analysisRules) {
    const hit = rule.check(text);
    const detail = rule.detail ? rule.detail(text) : '';
    if (hit || rule.severity === 'info') {
      issues.push({
        ruleId: rule.id, dim: rule.dim, name: rule.name, desc: rule.desc,
        severity: hit ? rule.severity : 'pass',
        detail: detail,
        autoFix: rule.autoFix, fixDesc: rule.fixDesc || '',
        fixApplied: false
      });
    }
  }

  // Compute scores
  const scores = computeScores(issues);

  // Build fixed text
  let fixedText = text;
  const fixableIssues = issues.filter(i => i.autoFix && i.severity !== 'pass');
  for (const issue of fixableIssues) {
    const rule = analysisRules.find(r => r.id === issue.ruleId);
    if (rule && rule.autoFixFn) {
      fixedText = rule.autoFixFn(fixedText);
    }
  }

  lastResults = { issues, scores, fixedText, stats: { totalChars, cnChars } };
  localStorage.setItem('awc_analysisResults', JSON.stringify(lastResults));
  restoreAnalysisUI(lastResults);
  showToast('分析完成: ' + issues.filter(i => i.severity !== 'pass').length + ' 项发现');
}

function computeScores(issues) {
  const dimDeductions = { structure: 0, language: 0, norms: 0, antiAI: 0 };
  const deductMap = { severe: 5, warn: 3, info: 1, pass: 0 };

  for (const issue of issues) {
    dimDeductions[issue.dim] += deductMap[issue.severity] || 0;
  }

  const scores = {};
  for (const dim of analysisDimensions) {
    scores[dim.id] = Math.max(0, dim.maxScore - (dimDeductions[dim.id] || 0));
  }
  scores.total = Object.values(scores).reduce((a, b) => a + b, 0);
  return scores;
}

function restoreAnalysisUI(results) {
  const { issues, scores, stats } = results;

  // Update scoreboard
  const scoreRow = document.getElementById('anScoreRow');
  if (scoreRow) {

// ── Auto-Fix Engine ──

function applySingleFix(ruleId) {
  if (!lastResults) { showToast('请先运行分析'); return; }

  const rule = analysisRules.find(r => r.id === ruleId);
  if (!rule || !rule.autoFixFn) { showToast('此规则暂不支持自动修复'); return; }

  const editor = document.getElementById('anEditor');
  const originalText = editor.value;
  const fixedText = rule.autoFixFn(originalText);

  if (fixedText === originalText) {
    showToast('未找到可修复的匹配项');
    return;
  }

  editor.value = fixedText;
  saveAnalysisText();

  const issue = lastResults.issues.find(i => i.ruleId === ruleId);
  if (issue) issue.fixApplied = true;
  lastResults.fixedText = fixedText;

  // Update button state
  const btn = document.getElementById('anFixBtn-' + ruleId);
  if (btn) {
    btn.className = 'an-btn an-btn-fix-done';
    btn.textContent = '✅ 已修复';
    btn.onclick = null;
  }

  // Show diff
  const diffCard = document.getElementById('anDiffCard');
  if (diffCard) diffCard.style.display = '';
  const diffView = document.getElementById('anDiffView');
  if (diffView) diffView.innerHTML = buildInlineDiff(originalText, fixedText);

  localStorage.setItem('awc_analysisResults', JSON.stringify(lastResults));
  showToast('已修复: ' + rule.name);
}

function applyAllFixes() {
  if (!lastResults) { showToast('请先运行分析'); return; }

  const editor = document.getElementById('anEditor');
  const originalText = editor.value;
  const originalForDiff = originalText;
  let fixedText = originalText;
  let fixCount = 0;

  for (const rule of analysisRules) {
    if (!rule.autoFixFn) continue;
    const newText = rule.autoFixFn(fixedText);
    if (newText !== fixedText) {
      fixedText = newText;
      fixCount++;
      const issue = lastResults.issues.find(i => i.ruleId === rule.id);
      if (issue) issue.fixApplied = true;
    }
  }

  if (fixCount === 0) { showToast('无可自动修复的问题'); return; }

  editor.value = fixedText;
  saveAnalysisText();
  lastResults.fixedText = fixedText;
  localStorage.setItem('awc_analysisResults', JSON.stringify(lastResults));

  // Refresh issue buttons
  restoreAnalysisUI(lastResults);

  // Show diff
  const diffCard = document.getElementById('anDiffCard');
  if (diffCard) diffCard.style.display = '';
  const diffView = document.getElementById('anDiffView');
  if (diffView) diffView.innerHTML = buildInlineDiff(originalForDiff, fixedText);

  showToast('已自动修复 ' + fixCount + ' 项问题');
}

// ── Diff View ──

function renderDiffView() {
  if (!lastResults) { showToast('请先运行分析'); return; }
  const editor = document.getElementById('anEditor');
  const currentText = editor ? editor.value : '';
  const originalText = lastResults.fixedText ? currentText : currentText;

  // Re-run fixes to get diff baseline
  let fixedText = currentText;
  for (const rule of analysisRules) {
    if (rule.autoFixFn) { fixedText = rule.autoFixFn(fixedText); }
  }

  const diffCard = document.getElementById('anDiffCard');
  if (diffCard) diffCard.style.display = '';
  const diffView = document.getElementById('anDiffView');
  if (diffView) {
    diffView.innerHTML = buildInlineDiff(currentText, fixedText);
  }
}

function buildInlineDiff(original, fixed) {
  if (original === fixed) return '<div style="color:var(--text3);text-align:center;padding:12px;">原始文本与修复后一致，无需对比</div>';

  // Simple sentence-level diff
  const origSentences = original.split(/(?<=[。！？\n])/);
  const fixedSentences = fixed.split(/(?<=[。！？\n])/);

  let result = '';
  const maxLen = Math.max(origSentences.length, fixedSentences.length);

  for (let i = 0; i < maxLen; i++) {
    const o = origSentences[i] || '';
    const f = fixedSentences[i] || '';
    if (o === f) {
      result += `<span>${escapeHtml(o)}</span>`;
    } else {
      if (o) result += `<span class="an-diff-del">${escapeHtml(o)}</span>`;
      if (f) result += `<span class="an-diff-ins">${escapeHtml(f)}</span>`;
    }
  }
  return result;
}

function analyzeText() {
  const text = document.getElementById('ccTextarea').value.trim();
  if (!text) { showToast('请先粘贴论文文本'); return; }

  const totalChars = text.length;
  const charsNoSpace = text.replace(/\s/g, '').length;
  const cnChars = (text.match(/[一-鿿]/g) || []).length;
  const paragraphs = text.split(/\n+/).filter(p => p.trim()).length;
  const words = text.split(/\s+/).filter(w => w.length > 0).length;
  const totalWords = cnChars + words;

  const phrases = [];
  for (let n = 6; n >= 4; n--) {
    for (let i = 0; i <= text.length - n; i++) {
      const gram = text.substring(i, i + n);
      if (/[一-鿿]/.test(gram) && !/[，。；：、！？\n\r]/.test(gram)) {
        phrases.push(gram);
      }
    }
  }

  const freq = {};
  phrases.forEach(p => { freq[p] = (freq[p] || 0) + 1; });
  const repeats = Object.entries(freq).filter(([k, v]) => v > 1).sort((a, b) => b[1] - a[1]).slice(0, 30);

  const totalPhrases = phrases.length || 1;
  const repeatedPhrases = repeats.reduce((sum, [, v]) => sum + v, 0);
  const estRate = Math.min(Math.round((repeatedPhrases / totalPhrases) * 100 * 1.8), 98);

  let level = '✅ 低风险';
  let levelColor = '#059669';
  if (estRate > 30) { level = '🔴 高风险'; levelColor = '#dc2626'; }
  else if (estRate > 15) { level = '🟡 中风险'; levelColor = '#d97706'; }

  document.getElementById('ccStatsRow').innerHTML = `
    <div class="cc-stat"><div class="num">${totalChars}</div><div class="lbl">总字符数</div></div>
    <div class="cc-stat"><div class="num">${cnChars}</div><div class="lbl">中文字数</div></div>
    <div class="cc-stat"><div class="num">${paragraphs}</div><div class="lbl">段落数</div></div>
    <div class="cc-stat"><div class="num" style="color:${levelColor}">${estRate}%</div><div class="lbl">${level}</div></div>
  `;

  let resultHTML = '';
  if (repeats.length === 0) {
    resultHTML = '<div style="color:#059669;font-weight:600">未检测到显著重复段落，文本原创度较高。</div>';
  } else {
    resultHTML = '<div style="margin-bottom:8px;font-weight:600">检测到以下高频重复短句（按出现次数排列）：</div>';
    repeats.forEach(([phrase, count], idx) => {
      resultHTML += `<div style="margin-bottom:4px;display:flex;gap:8px;align-items:flex-start">
        <span style="color:#e11d48;font-weight:700;min-width:28px">${count}×</span>
        <span>"<mark>${phrase}</mark>"</span>
        <span style="color:var(--text3);font-size:11px;white-space:nowrap">${phrase.length}字</span>
      </div>`;
    });
    resultHTML += `<div style="margin-top:10px;padding-top:8px;border-top:1px solid var(--border);font-size:12px;color:var(--text2)">
      ⚠️ 此为简易 n-gram 重复预估，结果仅供参考。正式查重请使用知网/维普/万方等官方平台。
      <br>📌 预估重复率 = ${estRate}% ｜ 检测到 ${repeats.length} 组重复短句（${repeatedPhrases} 处重复）
    </div>`;
  }

  document.getElementById('ccResult').innerHTML = resultHTML;
}

function handleFileUpload(e) {

      }
    };
    reader.readAsArrayBuffer(file);
  } else {
    showToast('仅支持 .txt 和 .docx 格式');
  }
}

  if (!file) return;
  const reader = new FileReader();

        document.getElementById('ccTextarea').value = text;

async function parseDocx(buf) {
  const data = new Uint8Array(buf);
  const view = new DataView(buf);
  const readU16 = (off) => view.getUint16(off, true);
  const readU32 = (off) => view.getUint32(off, true);

  // Find EOCD record
  let eocd = -1;
  for (let i = data.length - 22; i >= Math.max(0, data.length - 65557); i--) {
    if (readU32(i) === 0x06054b50) { eocd = i; break; }
  }
  if (eocd < 0) throw new Error('不是有效的 ZIP 文件');

  // Scan central directory for word/document.xml
  const cdOffset = readU32(eocd + 16);
  let pos = cdOffset;
  let xmlOffset = -1, compSize = 0, compMethod = 0;
  while (pos < data.length - 46) {
    if (readU32(pos) !== 0x02014b50) break;
    const nameLen = readU16(pos + 28);
    const name = String.fromCharCode(...data.slice(pos + 46, pos + 46 + nameLen));
    if (name === 'word/document.xml') {
      compMethod = readU16(pos + 10);
      compSize = readU32(pos + 20);
      const localOff = readU32(pos + 42);
      const localNameLen = readU16(localOff + 26);
      const localExtraLen = readU16(localOff + 28);
      xmlOffset = localOff + 30 + localNameLen + localExtraLen;
      break;
    }
    pos += 46 + nameLen + readU16(pos + 30) + readU16(pos + 32);
  }
  if (xmlOffset < 0) throw new Error('未找到 document.xml');

  const raw = data.slice(xmlOffset, xmlOffset + compSize);

  // Decompress with browser built-in DecompressionStream
  let xml;
  if (compMethod === 0) {
    xml = new TextDecoder().decode(raw);
  } else if (compMethod === 8) {
    const ds = new DecompressionStream('deflate-raw');
    const writer = ds.writable.getWriter();
    const reader = ds.readable.getReader();
    writer.write(raw);
    writer.close();
    const chunks = [];
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      chunks.push(value);
    }
    const totalLen = chunks.reduce((s, c) => s + c.length, 0);
    const decompressed = new Uint8Array(totalLen);
    let off = 0;
    for (const c of chunks) { decompressed.set(c, off); off += c.length; }
    xml = new TextDecoder().decode(decompressed);
  } else {
    throw new Error('不支持的压缩格式');
  }

  // Strip XML tags and decode entities
  xml = xml.replace(/<w:t[^>]*>/g, '').replace(/<\/w:t>/g, '')
           .replace(/<[^>]+>/g, ' ').replace(/&[a-z]+;/g, ' ')
           .replace(/\s+/g, ' ').trim();
  if (!xml) throw new Error('文档内容为空');
  return xml;
}

function clearCheckCenter() {
  const ta = document.getElementById('ccTextarea');
  if (ta) ta.value = '';
  const result = document.getElementById('ccResult');
  if (result) result.innerHTML = '<div class="empty">等待粘贴文本进行分析…</div>';
  const stats = document.getElementById('ccStatsRow');
  if (stats) stats.innerHTML = `
    <div class="cc-stat"><div class="num">-</div><div class="lbl">总字符数</div></div>
    <div class="cc-stat"><div class="num">-</div><div class="lbl">中文字数</div></div>
    <div class="cc-stat"><div class="num">-</div><div class="lbl">段落数</div></div>
    <div class="cc-stat"><div class="num">-</div><div class="lbl">预估重复率</div></div>
  `;
}

// ═══════════════ KEYBOARD SHORTCUTS ═══════════════

document.addEventListener('keydown', (e) => {
  if (e.ctrlKey || e.metaKey) {
    if (e.key === 's') { e.preventDefault(); saveStageContent(); }
    if (e.key === 'ArrowRight' && currentView === 'stage') { e.preventDefault(); selectStage(Math.min(currentStage + 1, stages.length - 1)); }
    if (e.key === 'ArrowLeft' && currentView === 'stage') { e.preventDefault(); selectStage(Math.max(currentStage - 1, 0)); }
    if (e.key === '1') { e.preventDefault(); switchTab('prompt'); }
    if (e.key === '2') { e.preventDefault(); switchTab('tools'); }
    if (e.key === '3') { e.preventDefault(); switchTab('checklist'); }
    if (e.key === '4') { e.preventDefault(); switchTab('role'); }
    if (e.key === 'Escape' && currentView === 'checkCenter') { e.preventDefault(); selectStage(8); }
    if (e.key === 'Escape' && currentView === 'latexTools') { e.preventDefault(); selectStage(9); }
    if (e.key === 'Escape' && currentView === 'analysis') { e.preventDefault(); selectStage(9); }
  }
});

// ═══════════════ STARTUP ═══════════════

restoreState();
init();

// Auto-load saved content for first stage
(function() {
  const editor = document.getElementById('stageEditor');
  if (editor && stageContent['stage_0']) {
    editor.value = stageContent['stage_0'];
  }
})();
</script>
